name: Build Re4QuadExtremeEditor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Restore NuGet packages
      run: nuget restore Re4QuadExtremeEditor/Re4QuadExtremeEditor.sln

    - name: Build
      run: msbuild Re4QuadExtremeEditor/Re4QuadExtremeEditor.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: Re4QuadExtremeEditor-Enhanced
        path: Re4QuadExtremeEditor/Re4QuadExtremeEditor/bin/Release/
