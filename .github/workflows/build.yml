name: Build Re4QuadExtremeEditor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore Re4QuadExtremeEditor/Re4QuadExtremeEditor.sln

    - name: Build Release
      run: msbuild Re4QuadExtremeEditor/Re4QuadExtremeEditor.sln /p:Configuration=Release /p:Platform="Any CPU" /p:OutputPath=bin\Release\

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Re4QuadExtremeEditor-Enhanced
        path: Re4QuadExtremeEditor/Re4QuadExtremeEditor/bin/Release/
